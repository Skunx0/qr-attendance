<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Attendance System</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    margin: 0;
}

header {
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    background: #020617;
}

#reader {
    width: 320px;
    margin: 20px auto;
    border-radius: 12px;
    overflow: hidden;
}

.status {
    margin-top: 15px;
    font-size: 18px;
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 95%;
    max-width: 600px;
    background: #020617;
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #1e293b;
}

th {
    background: #1e293b;
}

.present {
    color: #22c55e;
    font-weight: bold;
}

button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #ef4444;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #dc2626;
}
</style>
</head>

<body>

<header>📚 QR Attendance System</header>

<div id="reader"></div>

<div class="status" id="status">Scan a student's QR code...</div>

<button onclick="switchCamera()">🔄 Switch Camera</button>
<button onclick="clearData()">🗑️ Clear Attendance</button>

<table>
    <thead>
        <tr>
            <th>Student ID</th>
            <th>Status</th>
            <th>Time</th>
        </tr>
    </thead>
    <tbody id="attendanceTable"></tbody>
</table>

<script>
let attendance = JSON.parse(localStorage.getItem("attendance")) || {};

let html5QrCode = new Html5Qrcode("reader");

let cameras = [];
let currentCameraIndex = 0;

// Extract ID from QR
function extractStudentId(decodedText) {
    try {
        const url = new URL(decodedText);
        return url.searchParams.get("id") || decodedText;
    } catch {
        return decodedText.trim();
    }
}

// Update table
function updateTable() {
    const table = document.getElementById("attendanceTable");
    table.innerHTML = "";

    for (let id in attendance) {
        table.innerHTML += `
            <tr>
                <td>${id}</td>
                <td class="present">Present</td>
                <td>${attendance[id]}</td>
            </tr>
        `;
    }
}

// Save
function saveData() {
    localStorage.setItem("attendance", JSON.stringify(attendance));
}

// Clear
function clearData() {
    attendance = {};
    saveData();
    updateTable();
    document.getElementById("status").innerText = "🗑️ Attendance cleared";
}

// QR success
function onScanSuccess(decodedText) {
    const studentId = extractStudentId(decodedText);

    if (!attendance[studentId]) {
        const time = new Date().toLocaleTimeString();

        attendance[studentId] = time;
        saveData();

        document.getElementById("status").innerText =
            `✅ ${studentId} marked present at ${time}`;

        updateTable();
    } else {
        document.getElementById("status").innerText =
            `⚠️ ${studentId} already scanned`;
    }
}

// QR error
function onScanError(errorMessage) {
    // ignore
}

// Start camera
function startCamera(cameraId) {
    html5QrCode.start(
        cameraId,
        {
            fps: 10,
            qrbox: 250
        },
        onScanSuccess,
        onScanError
    );
}

// Switch camera
function switchCamera() {
    if (cameras.length < 2) {
        document.getElementById("status").innerText =
            "⚠️ Only one camera found";
        return;
    }

    html5QrCode.stop().then(() => {
        currentCameraIndex = (currentCameraIndex + 1) % cameras.length;
        startCamera(cameras[currentCameraIndex].id);

        document.getElementById("status").innerText =
            "🔄 Camera switched";
    }).catch(err => console.error(err));
}

// Load cameras + start
Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {

        cameras = devices;

        // try front camera first
        let front = devices.find(d =>
            d.label.toLowerCase().includes("front")
        );

        if (front) {
            currentCameraIndex = devices.indexOf(front);
        }

        startCamera(cameras[currentCameraIndex].id);
    }
}).catch(err => console.error(err));

// Load saved data
updateTable();
</script>

</body>
</html>

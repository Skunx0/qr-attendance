<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Attendance System</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    margin: 0;
}

header {
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    background: #020617;
}

#reader {
    width: 320px;
    margin: 20px auto;
    border-radius: 12px;
    overflow: hidden;
}

.status {
    margin-top: 15px;
    font-size: 18px;
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 95%;
    max-width: 600px;
    background: #020617;
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #1e293b;
}

th {
    background: #1e293b;
}

.present {
    color: #22c55e;
    font-weight: bold;
}

button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #ef4444;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #dc2626;
}
</style>
</head>

<body>

<header>📚 QR Attendance System</header>

<div id="reader"></div>

<div class="status" id="status">Scan a student's QR code...</div>

<button onclick="clearData()">Clear Attendance</button>

<table>
    <thead>
        <tr>
            <th>Student ID</th>
            <th>Status</th>
            <th>Time</th>
        </tr>
    </thead>
    <tbody id="attendanceTable"></tbody>
</table>

<script>
let attendance = JSON.parse(localStorage.getItem("attendance")) || {};

// Extract ID from QR (supports URL or plain text)
function extractStudentId(decodedText) {
    try {
        const url = new URL(decodedText);
        return url.searchParams.get("id") || decodedText;
    } catch {
        return decodedText.trim();
    }
}

// Update table
function updateTable() {
    const table = document.getElementById("attendanceTable");
    table.innerHTML = "";

    for (let id in attendance) {
        let row = `
            <tr>
                <td>${id}</td>
                <td class="present">Present</td>
                <td>${attendance[id]}</td>
            </tr>
        `;
        table.innerHTML += row;
    }
}

// Save data
function saveData() {
    localStorage.setItem("attendance", JSON.stringify(attendance));
}

// Clear attendance
function clearData() {
    attendance = {};
    saveData();
    updateTable();
    document.getElementById("status").innerText = "🗑️ Attendance cleared";
}

// When QR is scanned
function onScanSuccess(decodedText) {
    const studentId = extractStudentId(decodedText);

    if (!attendance[studentId]) {
        const time = new Date().toLocaleTimeString();

        attendance[studentId] = time;
        saveData();

        document.getElementById("status").innerText =
            `✅ ${studentId} marked present at ${time}`;

        updateTable();
    } else {
        document.getElementById("status").innerText =
            `⚠️ ${studentId} already scanned`;
    }
}

function onScanError(errorMessage) {
    // ignore
}

// Start camera
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {
        html5QrCode.start(
            devices[0].id,
            {
                fps: 10,
                qrbox: 250
            },
            onScanSuccess,
            onScanError
        );
    }
}).catch(err => {
    console.error(err);
});

// Load previous data
updateTable();
</script>

</body>
</html>
